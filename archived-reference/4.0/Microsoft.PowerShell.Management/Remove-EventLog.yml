syntaxes:
- syntax: |-
    ```Syntax
    Remove-EventLog
        [[-ComputerName] <String[]>]
        [-LogName] <String[]>
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-EventLog
        [[-ComputerName] <String[]>]
        [-Source <String[]>]
        [-WhatIf]
        [-Confirm]

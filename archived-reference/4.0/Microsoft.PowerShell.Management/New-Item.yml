    ```Syntax
    New-Item
        [-Path] <String[]>
        [-ItemType <String>]
        [-Value <Object>]
        [-Force]
        [-Credential <PSCredential>]
        [-WhatIf]
        [-Confirm]
        [-UseTransaction]
        [<CommonParameters>]
    ```

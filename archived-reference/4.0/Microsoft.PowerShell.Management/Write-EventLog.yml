### YamlMime:PowerShellCmdlet1
uid: Microsoft.PowerShell.Management.Write-EventLog
name: Write-EventLog
module: Microsoft.PowerShell.Management
isPreview: false
summary: |-
  Writes an event to an event log.
description: |-
  The Write-EventLog cmdlet writes an event to an event log.

  To write an event to an event log, the event log must exist on the computer and the source must be registered for the event log.

  The cmdlets that contain the EventLog noun (the EventLog cmdlets) work only on classic event logs.
  To get events from logs that use the Windows Event Log technology in Windows Vista and later versions of Windows, use Get-WinEvent.
notes: |-
  * To use Write-EventLog, start Windows PowerShell with the "Run as administrator" option.

  *
parameters:
  cmdletParameters:
  - name: Category
    type: <xref href="Int16" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a task category for the event.
      Enter an integer that is associated with the strings in the category message file for the event log.
    defaultValue: "1"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ComputerName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a remote computer.
      The default is the local computer.

      Type the NetBIOS name, an Internet Protocol (IP) address, or a fully qualified domain name of a remote computer.

      This parameter does not rely on Windows PowerShell remoting.
      You can use the ComputerName parameter of Get-EventLog even if your computer is not configured to run remote commands.
    aliases:
    - CN
    defaultValue: Local computer
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: EntryType
    type: <xref href="EventLogEntryType" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the entry type of the event.
      Valid values are Error, Warning, Information, SuccessAudit, and FailureAudit.
      The default value is Information.

      For a description of the values, see [EventLogEntryType Enumeration](https://go.microsoft.com/fwlink/?LinkId=143599) in the MSDN library.
    aliases:
    - ET
    defaultValue: Information
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "4"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: EventId
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the event identifier.
      This parameter is required.
      The maximum allowed value for the EventId parameter is 65535.
    aliases:
    - ID
    - EID
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "3"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LogName
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the log to which the event is written.
      Enter the log name (the value of the Log property, not the LogDisplayName).
      Wildcard characters are not permitted.
      This parameter is required.
    aliases:
    - LN
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Message
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the event message.
      This parameter is required.
    aliases:
    - MSG
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "5"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RawData
    type: <xref href="Byte" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the binary data that is associated with the event, in bytes.
    aliases:
    - RD
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Source
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the event source, which is typically the name of the application that is writing the event to the log.
    aliases:
    - SRC
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "2"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Write-EventLog
        [-LogName] <String>
        [-Source] <String>
        [[-EntryType] <EventLogEntryType>]
        [-Category <Int16>]
        [-EventId] <Int32>
        [-Message] <String>
        [-RawData <Byte[]>]
        [-ComputerName <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    You cannot pipe input to this cmdlet.
outputs:
- name: <xref href="System.Diagnostics.EventLogEntry" data-throw-if-not-resolved="False" />
  description: |-
    Write-EventLog returns objects that represents the events in the logs.
examples:
- title: Example 1
  description: |-
    ```
    PS C:\> write-eventlog -logname Application -source MyApp -eventID 3001 -entrytype Information -message "MyApp added a user-requested feature to the display." -category 1 -rawdata 10,20
    ```

    This command writes an event from the MyApp source to the Application event log.
- title: Example 2
  description: |-
    ```
    PS C:\> write-eventlog -computername Server01 -logname Application -source MyApp -eventID 3001 -message "MyApp added a user-requested feature to the display."
    ```

    This command writes an event from the MyApp source to the Application event log on the Server01 remote computer.

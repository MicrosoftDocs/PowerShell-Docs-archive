syntaxes:
- syntax: |-
    ```Syntax
    Update-FormatData
        [[-AppendPath] <String[]>]
        [-PrependPath <String[]>]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
  description: |-
    You can pipe a string that contains the append path to Update-FormatData.

syntaxes:
- syntax: |-
    ```Syntax
    Disable-PSBreakpoint
        [-Breakpoint] <Breakpoint[]>
        [-PassThru]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Breakpoint
  isDefault: true

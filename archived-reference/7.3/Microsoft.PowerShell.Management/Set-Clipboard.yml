### YamlMime:PowerShellCmdlet1
uid: Microsoft.PowerShell.Management.Set-Clipboard
name: Set-Clipboard
module: Microsoft.PowerShell.Management
isPreview: false
summary: |-
  Sets the contents of the clipboard.
description: |-
  The `Set-Clipboard` cmdlet sets the contents of the clipboard.

  > [!NOTE]
  > On Linux, this cmdlet requires the `xclip` utility to be in the path.
notes: |-
  PowerShell includes the following aliases for `Set-Clipboard`:

  - All platforms:
    - `scb`
parameters:
  cmdletParameters:
  - name: Append
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that the cmdlet should add to the clipboard instead of replacing it. By default, the
      cmdlet clears the current content from the clipboard and sets it to the new content. When this
      parameter is specified, the cmdlet appends the new content after a newline to the current content.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Confirm
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PassThru
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Returns an object representing the item with which you're working. By default, this cmdlet does not
      generate any output.
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Value
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      The string values to be added to the clipboard.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs. The cmdlet isn't run.
    aliases:
    - wi
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-Clipboard
        -Value <String[]>
        [-Append]
        [-WhatIf]
        [-Confirm]
        [-PassThru]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
  description: |-
    You can pipe a string containing the content to set to the clipboard to this cmdlet.
outputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet returns no output.
examples:
- title: 'Example 1: Copy text to the clipboard'
  description: |-
    ```powershell
    Set-Clipboard -Value "This is a test string"
    ```
- title: 'Example 2: Copy the contents of a file to the clipboard'
  description: |-
    This example pipes the contents of a file, a public ssh key, to the clipboard. Then, the key can be
    pasted into another application, like GitHub.

    ```powershell
    Get-Content C:\Users\user1\.ssh\id_ed25519.pub | Set-Clipboard
    ```

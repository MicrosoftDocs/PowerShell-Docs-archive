syntaxes:
- syntax: |-
    ```Syntax
    Set-PackageSource
        [[-Name] <string>]
        [-Credential <pscredential>]
        [-Location <string>]
        [-NewLocation <string>]
        [-NewName <string>]
        [-Trusted]
        [-Force]
        [-ForceBootstrap]
        [-WhatIf]
        [-Confirm]
        [-ProviderName <string>]
        [<CommonParameters>]
    ```
  parameterSetName: SourceBySearch
  isDefault: true
- syntax: |-
    ```Syntax
    Set-PackageSource
        -InputObject <PackageSource>
        [-Credential <pscredential>]
        [-NewLocation <string>]
        [-NewName <string>]
        [-Trusted]
        [-Force]
        [-ForceBootstrap]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: SourceByInputObject
  isDefault: false
- syntax: |-

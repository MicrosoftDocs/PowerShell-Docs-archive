        [-Trusted]
        [-Force]
        [-ForceBootstrap]
        [-WhatIf]
        [-Confirm]
        [-PackageManagementProvider <string>]
        [-Scope <string>]
        [-PublishLocation <string>]
        [<CommonParameters>]
    ```
  parameterSetName: PSModule:SourceByInputObject
  isDefault: false
- syntax: |-

syntaxes:
- syntax: |-
    ```Syntax
    Get-PackageSource
        [[-Name] <string>]
        [-Location <string>]
        [-Force]
        [-ForceBootstrap]
        [-ProviderName <string[]>]
        [-PackageManagementProvider <string>]
        [-Scope <string>]
        [-PublishLocation <string>]
        [<CommonParameters>]
    ```
  parameterSetName: PSModule

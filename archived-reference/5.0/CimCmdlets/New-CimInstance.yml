  - name: CimClass
    type: <xref href="CimClass" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a CIM class object that represents the type of the instance.

      You can use the Get-CimClass cmdlet to retrieve the class declaration from a computer.

      Using this parameter results in better client side schema validations.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: CimClassSessionSet
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    - name: CimClassComputerSet
      position: "0"
      isRequired: true

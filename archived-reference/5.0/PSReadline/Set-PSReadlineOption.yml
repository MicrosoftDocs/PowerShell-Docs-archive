### YamlMime:PowerShellCmdlet1
uid: PSReadline.Set-PSReadlineOption
name: Set-PSReadlineOption
module: PSReadline
isPreview: false
summary: |-
  Customizes the behavior of command line editing in **PSReadline**.
description: |-
  The `Set-PSReadlineOption` cmdlet customizes the behavior of the **PSReadline** module when you're
  editing the command line. To view the **PSReadline** settings, use `Get-PSReadlineOption`.
parameters:
  cmdletParameters:
  - name: AddToHistoryHandler
    type: <xref href="Func" data-throw-if-not-resolved="False" /><span>[</span><xref href="String, Boolean" data-throw-if-not-resolved="False" /><span>]</span>
    description: |-
      Specifies a **ScriptBlock** that controls which commands get added to **PSReadline** history.

      The **ScriptBlock** receives the command line as input. If the **ScriptBlock** returns `$True`, the
      command line is added to the history.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: BackgroundColor
    type: <xref href="ConsoleColor" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the background color for the token specified by the **TokenKind** parameter.

      The acceptable values for this parameter are as follows:

      - Black
      - DarkBlue
      - DarkGreen
      - DarkCyan
      - DarkRed
      - DarkMagenta
      - DarkYellow
      - Gray
      - DarkGray
      - Blue
      - Green
      - Cyan
      - Red
      - Magenta
      - Yellow
      - White
    acceptedValues:
    - Black
    - DarkBlue
    - DarkGreen
    - DarkCyan
    - DarkRed
    - DarkMagenta
    - DarkYellow
    - Gray
    - DarkGray
    - Blue
    - Green
    - Cyan
    - Red
    - Magenta
    - Yellow
    - White
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: ColorSet
      position: "2"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: BellStyle
    type: <xref href="BellStyle" data-throw-if-not-resolved="False" />
    description: |-
      Specifies how **PSReadline** responds to various error and ambiguous conditions.

      The valid values are as follows:

      - **Audible**: A short beep.
      - **Visual**: Text flashes briefly.
      - **None**: No feedback.
    acceptedValues:
    - None
    - Visual
    - Audible
    defaultValue: Audible
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CommandValidationHandler
    type: <xref href="Action" data-throw-if-not-resolved="False" /><span>[</span><xref href="CommandAst" data-throw-if-not-resolved="False" /><span>]</span>
    description: |-
      Specifies a **ScriptBlock** that is called from **ValidateAndAcceptLine**. If an exception is
      thrown, validation fails and the error is reported.

      Before throwing an exception, the validation handler can place the cursor at the point of the error
      to make it easier to fix. A validation handler can also change the command line, such as to correct
      common typographical errors.

      **ValidateAndAcceptLine** is used to avoid cluttering your history with commands that can't work.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: CompletionQueryItems
    type: <xref href="Int32" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum number of completion items that are shown without prompting.

      If the number of items to show is greater than this value, **PSReadline** prompts **yes/no** before
      displaying the completion items.
    defaultValue: "100"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named

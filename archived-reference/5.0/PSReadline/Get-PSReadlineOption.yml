    HistorySavePath                        : C:\Users\testuser\AppData\Roaming\Microsoft\Windows\PowerShell\PSReadline\Cons
                                             oleHost_history.txt
    HistorySaveStyle                       : SaveIncrementally
    DefaultTokenForegroundColor            : DarkYellow
    CommentForegroundColor                 : DarkGreen

### YamlMime:PowerShellCmdlet1
uid: PSReadline.Remove-PSReadlineKeyHandler
name: Remove-PSReadlineKeyHandler
module: PSReadline
isPreview: false
summary: |-
  Removes a key binding.
description: |-
  The `Remove-PSReadlineKeyHandler` cmdlet removes a specified key binding.
parameters:
  cmdletParameters:
  - name: Chord
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of keys or sequences of keys to be removed. A single binding is specified by
      using a single string. If the binding is a sequence of keys, separate the keys by a comma, as in
      the following example:

      `Ctrl+X,Ctrl+L`

      This parameter accepts an array of strings. Each string is a separate binding, not a sequence of
      keys for a single binding.
    aliases:
    - Key
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ViMode
    type: <xref href="ViMode" data-throw-if-not-resolved="False" />
    description: |-
      Specify which vi mode the binding applies to. Possible values are: Insert, Command.
    acceptedValues:
    - Insert
    - Command
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Remove-PSReadlineKeyHandler
        [-Chord] <String[]>
        [-ViMode <ViMode>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    You cannot pipe objects to this cmdlet.
outputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Remove a binding'
  description: |-
    ```powershell
    Remove-PSReadlineKeyHandler -Chord Ctrl+Shift+B
    ```

    This command removes the binding from the key combination, or chord, `Ctrl+Shift+B`.
    The `Ctrl+Shift+B` chord is created in the `Set-PSReadlineKeyHandler` article.

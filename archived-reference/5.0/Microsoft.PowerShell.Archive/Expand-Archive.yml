### YamlMime:PowerShellCmdlet1
uid: Microsoft.PowerShell.Archive.Expand-Archive
name: Expand-Archive
module: Microsoft.PowerShell.Archive
isPreview: false
summary: |-
  Extracts files from a specified archive (zipped) file.
description: |-
  The `Expand-Archive` cmdlet extracts files from a specified zipped archive file to a specified destination folder.
  An archive file allows multiple files to be packaged, and optionally compressed, into a single zipped file for easier distribution and storage.
parameters:
  cmdletParameters:
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: DestinationPath
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the path to the folder in which you want the command to save extracted files.
      Enter the path to a folder, but do not specify a file name or file name extension.
    defaultValue: Current location
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Force
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Forces the command to run without asking for user confirmation.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: LiteralPath
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the path to an archive file.
      Unlike the **Path** parameter, the value of **LiteralPath** is used exactly as it is typed.
      Wildcard characters are not supported.
      If the path includes escape characters, enclose each escape character in single quotation marks, to instruct PowerShell not to interpret any characters as escape sequences.
    aliases:
    - PSPath
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: LiteralPath
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Path
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the path to the archive file.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Path
      position: "0"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs.
      The cmdlet is not run.
    aliases:
    - wi
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,

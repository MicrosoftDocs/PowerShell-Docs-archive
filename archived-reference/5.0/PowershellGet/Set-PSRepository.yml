### YamlMime:PowerShellCmdlet1
uid: PowershellGet.Set-PSRepository
name: Set-PSRepository
module: PowershellGet
isPreview: false
summary: |-
  Sets values for a registered repository.
description: |-
  The **Set-PSRepository** cmdlet sets values for a registered module repository.
parameters:
  cmdletParameters:
  - name: InstallationPolicy
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the installation policy.
      Valid values are: Trusted, UnTrusted.
    acceptedValues:
    - Trusted
    - Untrusted
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the repository.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PackageManagementProvider
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the package management provider.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PublishLocation
    type: <xref href="Uri" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the URI of the publish location.
      For example, for NuGet-based repositories, the publish location is similar to http://someNuGetUrl.com/api/v2/Packages.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: SourceLocation
    type: <xref href="Uri" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the URI for discovering and installing modules from this repository.
      For example, for NuGet-based repositories, the source location is similar to `https://someNuGetUrl.com/api/v2`.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Set-PSRepository
        -Name <String>
        [-SourceLocation <Uri>]
        [-PublishLocation <Uri>]
        [-InstallationPolicy <String>]
        [-PackageManagementProvider <String>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
examples:
- title: 'Example 1: Set the installation policy for a repository'
  description: |-
    ```
    PS C:\> Set-PSRepository -Name "myInternalSource" -InstallationPolicy Trusted
    ```

    This command sets the installation policy for the myInternalSource repository to Trusted, so that users are not prompted before installing modules from that source.
- title: 'Example 2: Set the source and publish locations for a repository'
  description: |-
    ```
    PS C:\> Set-PSRepository -Name "myInternalSource" -SourceLocation 'http://someNuGetUrl.com/api/v2' -PublishLocation 'http://someNuGetUrl.com/api/v2/packages'
    ```

    This command sets the source location and publish location for myInternalSource to the specified URIs.

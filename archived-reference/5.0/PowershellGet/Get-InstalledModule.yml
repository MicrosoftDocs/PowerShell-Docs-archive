### YamlMime:PowerShellCmdlet1
uid: PowershellGet.Get-InstalledModule
name: Get-InstalledModule
module: PowershellGet
isPreview: false
summary: |-
  Gets installed modules on a computer.
description: |-
  The `Get-InstalledModule` cmdlet gets PowerShell modules that are installed on a computer using
  PowerShellGet. To see all modules installed on the system, use the `Get-Module -ListAvailable`
  command.
parameters:
  cmdletParameters:
  - name: MaximumVersion
    type: <xref href="Version" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum, or newest, version of a module to get.
      The **MaximumVersion** and **RequiredVersion** parameters are mutually exclusive; you cannot use both
      parameters in the same command.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MinimumVersion
    type: <xref href="Version" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the minimum version of a single module to get.
      The **MinimumVersion** and **RequiredVersion** parameters are mutually exclusive; you cannot use both
      parameters in the same command.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of names of modules to get.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RequiredVersion
    type: <xref href="Version" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the exact version of a module to get.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-InstalledModule
        [[-Name] <String[]>]
        [-MinimumVersion <Version>]
        [-RequiredVersion <Version>]
        [-MaximumVersion <Version>]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="Microsoft.PowerShell.Commands.PSRepositoryItemInfo" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get all installed modules'
  description: |-
    ```powershell
    Get-InstalledModule
    ```

    ```Output
    Version    Name                                Type       Repository     Description
    -------    ----                                ----       ----------     -----------
    2.0.0      PSGTEST-UploadMultipleVersionOfP... Module     GalleryINT     Module for DAC functionality
    1.3.5      AzureAutomationDebug                Module     PSGallery      Module for debugging Azure Automation runbooks, emulating AA native cmdlets
    1.0.1      AzureRM.Automation                  Module     PSGallery      Microsoft Azure PowerShell - Automation service cmdlets for Azure Resource Manager
    ```

    This command gets all installed modules.
- title: 'Example 2: Get specific versions of a module'
  description: |-
    ```powershell
    Get-InstalledModule -Name "AzureRM.Automation" -MinimumVersion 1.0 -MaximumVersion 2.0
    ```

    ```Output
    Version    Name                                Type       Repository     Description
    -------    ----                                ----       ----------     -----------
    1.0.1      AzureRM.Automation                  Module     PSGallery      Microsoft Azure PowerShell - Automation service cmdlets for Azure Resource Manager
    ```

    This command gets versions of the AzureRM.Automation module from version 1.0 through version 2.0.

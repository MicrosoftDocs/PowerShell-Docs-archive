### YamlMime:PowerShellCmdlet1
uid: Microsoft.PowerShell.Utility.New-Guid
name: New-Guid
module: Microsoft.PowerShell.Utility
isPreview: false
summary: |-
  Creates a GUID.
description: |-
  The **New-Guid** cmdlet creates a random globally unique identifier (GUID).
  If you need a unique ID in a script, you can create a GUID, as needed.
syntaxes:
- syntax: |-
    ```Syntax
    New-Guid
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="System.Guid" data-throw-if-not-resolved="False" />
  description: |-
    This cmdlet returns a GUID.
examples:
- title: 'Example 1: Create a GUID'
  description: |-
    ```
    PS C:\> New-Guid
    Guid
    ----
    0352cf0f-2e7a-4aee-801d-7f27f8344c77
    ```

    This command creates a random GUID.
    Alternatively, you could store the output of this cmdlet in a variable to use elsewhere in a script.

syntaxes:
- syntax: |-
    ```Syntax
    Write-Error
        [-Message] <String>
        [-Category <ErrorCategory>]
        [-ErrorId <String>]
        [-TargetObject <Object>]
        [-RecommendedAction <String>]
        [-CategoryActivity <String>]
        [-CategoryReason <String>]
        [-CategoryTargetName <String>]
        [-CategoryTargetType <String>]
        [<CommonParameters>]
    ```
  parameterSetName: NoException
  isDefault: true
- syntax: |-
    ```Syntax
    Write-Error
        -Exception <Exception>
        [-Message <String>]
        [-Category <ErrorCategory>]
        [-ErrorId <String>]
        [-TargetObject <Object>]
        [-RecommendedAction <String>]
        [-CategoryActivity <String>]
        [-CategoryReason <String>]
        [-CategoryTargetName <String>]
        [-CategoryTargetType <String>]
        [<CommonParameters>]
    ```
  parameterSetName: WithException
  isDefault: false

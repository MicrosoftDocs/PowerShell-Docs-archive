- syntax: |-
    ```Syntax
    Get-Service
        -DisplayName <String[]>
        [-ComputerName <String[]>]
        [-DependentServices]
        [-RequiredServices]
        [-Include <String[]>]
        [-Exclude <String[]>]
        [<CommonParameters>]
    ```
  parameterSetName: DisplayName
  isDefault: false
- syntax: |-
    ```Syntax
    Get-Service
        [-ComputerName <String[]>]
        [-DependentServices]
        [-RequiredServices]

### YamlMime:PowerShellCmdlet1
uid: Microsoft.PowerShell.Management.Get-Clipboard
name: Get-Clipboard
module: Microsoft.PowerShell.Management
isPreview: false
summary: |-
  Gets the current Windows clipboard entry.
description: |-
  The `Get-Clipboard` cmdlet gets the current Windows clipboard entry.
parameters:
  cmdletParameters:
  - name: Format
    type: <xref href="ClipboardFormat" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the type, or format, of the clipboard. The acceptable values for this parameter are:

      - Text
      - FileDropList
      - Image
      - Audio
    acceptedValues:
    - Text
    - FileDropList
    - Image
    - Audio
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Raw
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this cmdlet ignores newline characters and gets the entire contents of the clipboard.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: TextFormatType
    type: <xref href="TextDataFormat" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the text data format type of the clipboard. The acceptable values for this parameter are:

      - Text
      - UnicodeText
      - Rtf
      - Html
      - CommaSeparatedValue
    acceptedValues:
    - Text
    - UnicodeText
    - Rtf
    - Html
    - CommaSeparatedValue
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Get-Clipboard
        [-Format <ClipboardFormat>]
        [-TextFormatType <TextDataFormat>]
        [-Raw]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
outputs:
- name: <xref href="System.String, System.IO.FileInfo, System.IO.Stream, System.Drawing.Image" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Get the content of the clipboard and display it to the command-line'
  description: |-
    In this example we have right-clicked on an image in a browser and chose the **Copy** action. The
    following command displays the link, as a URL, of the image that is stored in the clipboard.

    ```powershell
    Get-Clipboard
    ```

    ```Output
    https://en.wikipedia.org/wiki/PowerShell
    ```
- title: 'Example 2: Get the content of the clipboard in a specific format'
  description: |-
    In this example we copied files to the clipboard in Windows Explorerby selecting them and pressing
    <kbd>Ctrl-C</kbd>. Using the following command, you can access the contents of the clipboard as a
    list of files:

    ```powershell
    Get-Clipboard -Format FileDropList
    ```

    ```Output
        Directory: C:\Git\PS-Docs\PowerShell-Docs\wmf

    Mode                LastWriteTime         Length Name
    ----                -------------         ------ ----
    -a----         5/7/2019   1:11 PM          10010 TOC.yml
    -a----       11/18/2016  10:10 AM             53 md.style
    -a----         5/6/2019   9:32 AM           4177 overview.md
    -a----        6/28/2018   2:28 PM            345 README.md
    ```

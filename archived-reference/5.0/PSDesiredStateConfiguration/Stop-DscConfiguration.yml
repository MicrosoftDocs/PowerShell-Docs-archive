syntaxes:
- syntax: |-
    ```Syntax
    Stop-DscConfiguration
        [-Force]
        [-CimSession <CimSession[]>]
        [-ThrottleLimit <Int32>]
        [-AsJob]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: All
  isDefault: false

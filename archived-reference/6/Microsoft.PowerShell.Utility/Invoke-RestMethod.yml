  - name: InFile
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Gets the content of the web request from a file.

      Enter a path and file name. If you omit the path, the default is the current location.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)

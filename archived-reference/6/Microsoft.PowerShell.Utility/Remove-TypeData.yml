syntaxes:
- syntax: |-
    ```Syntax
    Remove-TypeData
        -TypeData <TypeData>
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RemoveTypeDataSet
  isDefault: true
- syntax: |-
    ```Syntax
    Remove-TypeData
        [-TypeName] <String>
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: RemoveTypeSet
  isDefault: false
- syntax: |-

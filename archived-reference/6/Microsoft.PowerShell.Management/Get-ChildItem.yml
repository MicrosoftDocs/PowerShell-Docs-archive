syntaxes:
- syntax: |-
    ```Syntax
    Get-ChildItem
        [[-Path] <string[]>]
        [[-Filter] <string>]
        [-Include <string[]>]
        [-Exclude <string[]>]
        [-Recurse]
        [-Depth <uint32>]
        [-Force]
        [-Name]
        [-Attributes <FlagsExpression[FileAttributes]>]
        [-FollowSymlink]
        [-Directory]
        [-File]
        [-Hidden]
        [-ReadOnly]
        [-System]
        [<CommonParameters>]
    ```
  parameterSetName: Items
  isDefault: true
- syntax: |-
    ```Syntax
    Get-ChildItem
        [[-Filter] <string>]
        -LiteralPath <string[]>
        [-Include <string[]>]
        [-Exclude <string[]>]
        [-Recurse]
        [-Depth <uint32>]
        [-Force]
        [-Name]
        [-Attributes <FlagsExpression[FileAttributes]>]
        [-FollowSymlink]
        [-Directory]
        [-File]
        [-Hidden]
        [-ReadOnly]
        [-System]
        [<CommonParameters>]
    ```
  parameterSetName: LiteralItems
  isDefault: false
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
  description: |-
    You can pipe a string that contains a path to `Get-ChildItem`.
outputs:
- name: <xref href="System.Object" data-throw-if-not-resolved="False" />
  description: |-
    The type of object that `Get-ChildItem` returns is determined by the objects in the provider drive
    path.
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
  description: |-
    If you use the **Name** parameter, `Get-ChildItem` returns the object names as strings.

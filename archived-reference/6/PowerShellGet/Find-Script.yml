### YamlMime:PowerShellCmdlet1
uid: PowerShellGet.Find-Script
name: Find-Script
module: PowerShellGet
isPreview: false
summary: |-
  Finds a script.
description: |-
  The **Find-Script** cmdlet finds a specified script in registered repositories.
parameters:
  cmdletParameters:
  - name: AllowPrerelease
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Includes in the results scripts marked as a prerelease.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: AllVersions
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this operation finds all script versions.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Command
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of commands to find in scripts.
      A command can be a function or workflow.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Credential
    type: <xref href="System.Management.Automation.PSCredential" data-throw-if-not-resolved="False" />
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Filter
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Finds scripts based on the PackageManagement provider-specific search syntax.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: IncludeDependencies
    type: <xref href="System.Management.Automation.SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Indicates that this operation gets all scripts that are dependent upon the script specified in the *Name* parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Includes
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies type of script to get.
      The acceptable values for this parameter are: Function, Workflow.
    acceptedValues:
    - Function
    - Workflow
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MaximumVersion
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the maximum, or newest, version of the script to find.
      The *MaximumVersion* and *RequiredVersion* parameters are mutually exclusive; you cannot use both parameters in the same command.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: MinimumVersion
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the minimum version of the script to find.
      The *MinimumVersion* and *RequiredVersion* parameters are mutually exclusive; you cannot use both parameters in the same command.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of names of scripts to find.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "0"
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: true
  - name: Proxy
    type: <xref href="System.Uri" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a proxy server for the request, rather than connecting directly to the Internet resource.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: ProxyCredential
    type: <xref href="System.Management.Automation.PSCredential" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a user account that has permission to use the proxy server that is specified by the **Proxy** parameter.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Repository
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the friendly name of a repository that has been registered by running Register-PSRepository.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: RequiredVersion
    type: <xref href="System.String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the exact version number of the script to find.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Tag
    type: <xref href="System.String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies an array of tags.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    Find-Script
        [[-Name] <String[]>]
        [-MinimumVersion <String>]
        [-MaximumVersion <String>]
        [-RequiredVersion <String>]
        [-AllVersions]
        [-IncludeDependencies]
        [-Filter <String>]
        [-Tag <String[]>]
        [-Includes <String[]>]
        [-Command <String[]>]
        [-Proxy <Uri>]
        [-ProxyCredential <PSCredential>]
        [-Repository <String[]>]
        [-Credential <PSCredential>]
        [-AllowPrerelease]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
- name: <xref href="System.Uri" data-throw-if-not-resolved="False" />
- name: <xref href="System.Management.Automation.PSCredential" data-throw-if-not-resolved="False" />
outputs:
- name: <xref href="PSRepositoryItemInfo" data-throw-if-not-resolved="False" />
examples:
- title: 'Example 1: Find all available scripts'
  description: |-
    ```
    PS C:\> Find-Script
    Version    Name                                Type       Repository           Description
    -------    ----                                ----       ----------           -----------
    2.5        Fabrikam-ClientScript               Script     LocalRepo1           Description for the Fabrikam-ClientScript script
    2.5        Fabrikam-Script                     Script     LocalRepo1           Description for the Fabrikam-Script script
    2.5        Fabrikam-ServerScript               Script     LocalRepo1           Description for the Fabrikam-ServerScript script
    2.5        Required-Script1                    Script     LocalRepo1           Description for the Required-Script1 script
    2.5        Required-Script2                    Script     LocalRepo1           Description for the Required-Script2 script
    2.5        Required-Script3                    Script     LocalRepo1           Description for the Required-Script3 script
    2.0        Script-WithDependencies1            Script     LocalRepo1           Description for the Script-WithDependencies1 script
    2.0        Script-WithDependencies2            Script     LocalRepo1           Description for the Script-WithDependencies2 script
    2.0        Start-WFContosoServer               Script     LocalRepo1           Start-WFContosoServer Script example
    2.1        Test-Script1                        Script     LocalRepo1           Test-Script1 Script example
    2.0        Test-Script2                        Script     LocalRepo1           Test-Script2 Script example
    1.0        TestRunbook                         Script     LocalRepo1           Contoso Script example
    ```

    This command finds all available scripts.
- title: 'Example 2: Find a script by name'
  description: |-
    ```
    PS C:\> Find-Script -Name "Start-WFContosoServer"
    Version    Name                                Type       Repository           Description
    -------    ----                                ----       ----------           -----------
    2.0        Start-WFContosoServer               Script     LocalRepo1           Start-WFContosoServer Script example
    ```

    This command find the script named Start-WFContosoServer.
- title: 'Example 3: Find a script by name, required version, and from a specified repository'
  description: |-
    ```
    PS C:\> Find-Script -Name "Required-Script2" -RequiredVersion 2.0 -Repository "LocalRepo01"
    ```

    This command finds a script by name and required version in the LocalRepo01 repository.
- title: 'Example 4: Find a script and format the output as a list'
  description: |-
    ```
    PS C:\> Find-Script -Name "Required-Script2" -RequiredVersion 2.0 -Repository "LocalRepo1" | Format-List * -Force
    Name                       : Required-Script2
    Version                    : 2.0
    Type                       : Script
    Description                : Description for the Required-Script2 script
    Author                     : pattif
    CompanyName                : Microsoft Corporation
    Copyright                  : 2015 Microsoft Corporation. All rights reserved.
    PublishedDate              : 8/14/2015 2:37:01 PM
    LicenseUri                 : http://required-script2.com/license
    ProjectUri                 : http://required-script2.com/
    IconUri                    : http://required-script2.com/icon
    Tags                       : {, Tag1, Tag2, Tag-Required-Script2-2.0...}
    Includes                   : {Function, DscResource, Cmdlet, Command}
    PowerShellGetFormatVersion :
    ReleaseNotes               : Required-Script2 release notes
    Dependencies               : {}
    RepositorySourceLocation   : C:\MyLocalRepo
    Repository                 : LocalRepo01
    PackageManagementProvider  : NuGet
    ```

    This command finds Required-Script2 in the LocalRepo1 repository, and then passes the resulting **PSRepositoryItemInfo** object to the Format-List cmdlet.
- title: 'Example 5: Find a script in the specified version range'
  description: |-
    ```
    PS C:\> Find-Script -Name "Required-Script2" -MinimumVersion 2.1 -MaximumVersion 2.5 -Repository "LocalRepo1"
    Version    Name                                Type       Repository           Description
    -------    ----                                ----       ----------           -----------
    2.5        Required-Script2                    Script     LocalRepo1           Description for the Required-Script2 script
    ```

    This command finds all versions of RequiredScript2 between versions 2.1 and 2.5 in the LocalRepo1 respository.
- title: 'Example 6: Find all versions of a script'
  description: |-
    ```
    PS C:\> Find-Script -Name "Required-Script02" -AllVersions
    Version    Name                                Type       Repository           Description
    -------    ----                                ----       ----------           -----------
    1.0        Required-Script2                    Script     LocalRepo1           Description for the Required-Script2 script
    1.5        Required-Script2                    Script     LocalRepo1           Description for the Required-Script2 script
    2.0        Required-Script2                    Script     LocalRepo1           Description for the Required-Script2 script
    2.5        Required-Script2                    Script     LocalRepo1           Description for the Required-Script2 script
    ```

    This command finds all versions of Required-Script02.
- title: 'Example 7: Find a script and its dependencies'
  description: |-
    ```
    PS C:\> Find-Script -Name "Script-WithDependencies1" -IncludeDependencies -Repository "LocalRepo1"
    Version    Name                                Type       Repository           Description
    -------    ----                                ----       ----------           -----------
    1.0        Script-WithDependencies1            Script     LocalRepo1           Description for the Script-WithDependencies1 script
    2.0        RequiredModule3                     Script     LocalRepo1           RequiredModule3 module
    2.5        Required-Script1                    Script     LocalRepo1           Description for the Required-Script1 script
    2.5        Required-Script2                    Script     LocalRepo1           Description for the Required-Script2 script
    ```

    This command finds a script and its dependencies.
- title: 'Example 8: Find scripts with the specified tag'
  description: |-
    ```
    PS C:\> Find-Script -Tag "Tag1" -Repository "LocalRepo1"
    Version    Name                                Type       Repository           Description
    -------    ----                                ----       ----------           -----------
    1.0        Fabrikam-ClientScript               Script     LocalRepo1           Description for the Fabrikam-ClientScript script
    ```

    This command finds scripts that have the tag Tag1 in the LocalRepo1 repository
- title: 'Example 9: Find scripts with specified command name'
  description: |-
    ```
    PS C:\> Find-Script -Command Test-FunctionFromScript_Required-Script3 -Repository "LocalRepo1"
    Version    Name                                Type       Repository           Description
    -------    ----                                ----       ----------           -----------
    2.5        Required-Script3                    Script     LocalRepo1           Description for the Required-Script3 script
    ```

    This command finds a script that contains the specified command name.
- title: 'Example 10: Find scripts with workflows'
  description: |-
    ```
    PS C:\> Find-Script -Includes "Workflow" -Repository "LocalRepo1"
    Version    Name                                Type       Repository           Description
    -------    ----                                ----       ----------           -----------
    2.5        Fabrikam-ClientScript               Script     LocalRepo1           Description for the Fabrikam-ClientScript script
    1.0        Fabrikam-Script                     Script     LocalRepo1           Description for the Fabrikam-Script script
    ```

    This command finds workflow scripts in the LocalRepo1 repository.
- title: 'Example 11: Find scripts using wildcards'
  description: |-
    ```
    PS C:\> Find-Script -Name "Required-Script*" -Repository "LocalRepo1"
    Version    Name                                Type       Repository           Description
    -------    ----                                ----       ----------           -----------
    2.5        Required-Script1                    Script     local1               Description for the Required-Script1 script
    2.5        Required-Script2                    Script     local1               Description for the Required-Script2 script
    2.5        Required-Script3                    Script     local1               Description for the Required-Script3 script
    ```

    This command uses the wildcard character (*) to find scripts that begin with Required-Script.

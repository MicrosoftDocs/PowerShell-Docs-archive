  isDefault: false
inputs:
- name: <xref href="Microsoft.PowerShell.ScheduledJob.ScheduledJobDefinition" data-throw-if-not-resolved="False" />
  description: |-
    You can pipe scheduled jobs to the **Remove-JobTrigger** cmdlet.

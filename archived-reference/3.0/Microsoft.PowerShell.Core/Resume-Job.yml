    type: <xref href="Job" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>
    description: |-
      Specifies the jobs to be resumed.
      Enter a variable that contains the jobs or a command that gets the jobs.
      You can also pipe jobs to the **Resume-Job** cmdlet.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: JobParameterSet
      position: "1"
      isRequired: true
      valueFromPipeline: true
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" /><span>[</span><span>]</span>

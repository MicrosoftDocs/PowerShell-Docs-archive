### YamlMime:PowerShellCmdlet1
uid: Microsoft.PowerShell.Host.Stop-Transcript
name: Stop-Transcript
module: Microsoft.PowerShell.Host
isPreview: false
description: |-
  The `Stop-Transcript` cmdlet stops a transcript that was started by using the `Start-Transcript` cmdlet.
notes: |-
  * If a transcript has not been started, the command fails.
syntaxes:
- syntax: |-
    ```Syntax
    Stop-Transcript
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    You cannot pipe input to this cmdlet.
outputs:
- name: <xref href="System.String" data-throw-if-not-resolved="False" />
  description: |-
    `Stop-Transcript` returns a string that contains a status message and the path to the output file.
examples:
- title: Example 1
  description: |-
    ```powershell
    Stop-Transcript
    ```

    This command stops any running transcripts.

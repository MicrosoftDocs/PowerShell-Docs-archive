syntaxes:
- syntax: |-
    ```Syntax
    Debug-Process
        [-Name] <String[]>
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Name
  isDefault: true
- syntax: |-
    ```Syntax
    Debug-Process
        [-Id] <Int32[]>
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Id
  isDefault: false
- syntax: |-
    ```Syntax
    Debug-Process
        -InputObject <Process[]>
        [-WhatIf]

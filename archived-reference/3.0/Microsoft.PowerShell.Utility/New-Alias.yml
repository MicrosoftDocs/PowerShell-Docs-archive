### YamlMime:PowerShellCmdlet1
uid: Microsoft.PowerShell.Utility.New-Alias
name: New-Alias
module: Microsoft.PowerShell.Utility
isPreview: false
summary: |-
  Creates a new alias.
description: |-
  The New-Alias cmdlet creates a new alias in the current Windows PowerShell session.
  Aliases created by using New-Alias are not saved after you exit the session or close Windows PowerShell.
  You can use the Export-Alias cmdlet to save your alias information to a file.
  You can later use Import-Alias to retrieve that saved alias information.
parameters:
  cmdletParameters:
  - name: Confirm
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Prompts you for confirmation before running the cmdlet.
    aliases:
    - cf
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Description
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies a description of the alias.
      You can type any string.
      If the description includes spaces, enclose it in quotation marks.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Force
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      If set, act like set-alias if the alias named already exists.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Name
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the new alias.
      You can use any alphanumeric characters in an alias, but the first character cannot be a number.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "1"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Option
    type: <xref href="ScopedItemOptions" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the value of the **Options** property of the alias.
      Valid values are:

      - None: The alias has no constraints (default value)
      - ReadOnly: The alias can be deleted but cannot be changed except by using the **Force** parameter
      - Constant: The alias cannot be deleted or changed
      - Private: The alias is available only in the current scope
      - AllScope: The alias is copied to any new scopes that are created
      - Unspecified: The option is not specified

      To see the **Options** property of all aliases in the session, type `Get-Alias | Format-Table -Property Name, Options -AutoSize`.
    acceptedValues:
    - None
    - ReadOnly
    - Constant
    - Private
    - AllScope
    - Unspecified
    defaultValue: '[System.Management.Automation.ScopedItemOptions]::None'
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: PassThru
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Returns an object representing the new alias.
      By default, this cmdlet does not generate any output.
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Scope
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the scope of the new alias.
      Valid values are "Global", "Local", or "Script", or a number relative to the current scope (0 through the number of scopes, where 0 is the current scope and 1 is its parent).
      "Local" is the default.
      For more information, see about_Scopes.
    defaultValue: Local
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: Value
    type: <xref href="String" data-throw-if-not-resolved="False" />
    description: |-
      Specifies the name of the cmdlet or command element that is being aliased.
    defaultValue: None
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: "2"
      isRequired: true
      valueFromPipeline: false
      valueFromPipelineByPropertyName: true
      valueFromRemainingArguments: false
    supportsWildcards: false
  - name: WhatIf
    type: <xref href="SwitchParameter" data-throw-if-not-resolved="False" />
    description: |-
      Shows what would happen if the cmdlet runs.
      The cmdlet is not run.
    aliases:
    - wi
    defaultValue: "False"
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: (All)
      position: Named
      isRequired: false
      valueFromPipeline: false
      valueFromPipelineByPropertyName: false
      valueFromRemainingArguments: false
    supportsWildcards: false
  commonParameters: |-
    This cmdlet supports the common parameters: -Debug, -ErrorAction, -ErrorVariable,
    -InformationAction, -InformationVariable, -OutBuffer, -OutVariable, -PipelineVariable,
    -ProgressAction, -Verbose, -WarningAction, and -WarningVariable. For more information, see
    [about_CommonParameters](https://go.microsoft.com/fwlink/?LinkID=113216).
syntaxes:
- syntax: |-
    ```Syntax
    New-Alias
        [-Name] <String>
        [-Value] <String>
        [-Description <String>]
        [-Option <ScopedItemOptions>]
        [-PassThru]
        [-Scope <String>]
        [-Force]
        [-WhatIf]
        [-Confirm]
        [<CommonParameters>]
    ```
  parameterSetName: Default
  isDefault: true
inputs:
- name: <xref href="None" data-throw-if-not-resolved="False" />
  description: |-
    You cannot pipe input to this cmdlet.
outputs:
- name: <xref href="None or System.Management.Automation.AliasInfo" data-throw-if-not-resolved="False" />
  description: |-
    When you use the Passthru parameter, New-Alias generates a System.Management.Automation.AliasInfo object representing the new alias.
    Otherwise, this cmdlet does not generate any output.
examples:
- title: Example 1
  description: |-
    ```powershell
    New-Alias list get-childitem
    ```

    This command creates an alias named "list" to represent the Get-ChildItem cmdlet.
- title: Example 2
  description: |-
    ```powershell
    New-Alias -Name w -Value get-wmiobject -Description "quick wmi alias" -Option ReadOnly
    Get-Alias -Name w | Format-List *
    ```

    This command creates an alias named "w" to represent the Get-WMIObject cmdlet.
    It creates a description, "quick wmi alias", for the alias and makes it read only.
    The last line of the command uses Get-Alias to get the new alias and pipes it to Format-List to display all of the information about it.

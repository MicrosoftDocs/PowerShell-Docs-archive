      Gets only breakpoints of the specified types.
      Enter one or more types.
      Valid values are Line, Command, and Variable.
      You can also pipe breakpoint types to Get-PSBreakpoint.
    defaultValue: All types
    dontShow: false
    isDynamic: false
    parameterSets:
    - name: Type
